spring:
  application:
    name: backend
  config:
    import: optional:application-local.yml
  datasource:
    url: jdbc:postgresql://postgres:5432/snip-it-db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always